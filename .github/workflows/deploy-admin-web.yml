# Build on GitHub, upload dist tarball, extract to Nginx site root — no git on server.
# Optional: GitHub secret SERVER_DOTENV_B64 = base64 of repo-root .env (Vite bakes VITE_* at build time).
# Create (Linux):  printf '%s' "$(cat .env)" | base64 -w0
name: Deploy admin-web (artifact)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Single source of truth: .env must live next to package.json used for npm run build.
      - name: Resolve Vite project directory
        id: vite
        run: |
          set -eu
          if [ -f package.json ]; then
            echo "root=." >> "$GITHUB_OUTPUT"
            echo "lock=package-lock.json" >> "$GITHUB_OUTPUT"
            echo "Using repo root (standalone admin-web repository)."
          elif [ -f admin-web/package.json ]; then
            echo "root=admin-web" >> "$GITHUB_OUTPUT"
            echo "lock=admin-web/package-lock.json" >> "$GITHUB_OUTPUT"
            echo "Using admin-web/ (multi-package repo layout)."
          else
            echo "ERROR: no package.json in ./ or admin-web/" >&2
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ${{ steps.vite.outputs.lock }}

      - name: Write .env from SERVER_DOTENV_B64 (optional)
        env:
          SERVER_DOTENV_B64: ${{ secrets.SERVER_DOTENV_B64 }}
        run: |
          set -eu
          if [ -z "${SERVER_DOTENV_B64:-}" ]; then
            echo "SERVER_DOTENV_B64 unset; Vite build uses repo .env / defaults."
            exit 0
          fi
          R="${{ steps.vite.outputs.root }}"
          printf '%s' "$SERVER_DOTENV_B64" | base64 -d | sed '1s/^\xEF\xBB\xBF//' > "${R}/.env"
          echo "Wrote ${R}/.env from SERVER_DOTENV_B64"

      - name: Install and build
        run: |
          set -eu
          cd "${{ steps.vite.outputs.root }}"
          npm ci && npm run build

      - name: Pack dist
        run: |
          set -eu
          cd "${{ steps.vite.outputs.root }}"
          tar -czf "${GITHUB_WORKSPACE}/admin-dist.tgz" -C dist .

      - name: Upload dist bundle to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          port: ${{ secrets.ALIYUN_SSH_PORT }}
          source: admin-dist.tgz
          target: /tmp/

      - name: Publish static files
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          port: ${{ secrets.ALIYUN_SSH_PORT }}
          script: |
            set -eu
            PUB_DIR="${{ secrets.SERVER_ADMIN_PUBLIC_DIR }}"
            test -d "${PUB_DIR}"
            cd "${PUB_DIR}"
            # Baota may create .user.ini (often immutable); never delete it. Optional: keep .htaccess if you customize it.
            find . -mindepth 1 ! -name '.user.ini' ! -name '.htaccess' -delete
            tar -xzf /tmp/admin-dist.tgz -C "${PUB_DIR}"
            rm -f /tmp/admin-dist.tgz
