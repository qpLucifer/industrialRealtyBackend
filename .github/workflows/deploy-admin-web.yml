# Build on GitHub, upload dist tarball, extract to Nginx site root — no git on server.
# Optional: GitHub secret SERVER_DOTENV_B64 = base64 of admin-web/.env (Vite bakes VITE_* at build time).
# Create:  printf '%s' "$(cat .env)" | base64 -w0
name: Deploy admin-web (artifact)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Write admin-web .env from SERVER_DOTENV_B64 (optional)
        env:
          SERVER_DOTENV_B64: ${{ secrets.SERVER_DOTENV_B64 }}
        run: |
          set -eu
          if [ -z "${SERVER_DOTENV_B64:-}" ]; then
            echo "SERVER_DOTENV_B64 unset; Vite build uses repo files / defaults."
            exit 0
          fi
          if [ -d admin-web ]; then
            printf '%s' "$SERVER_DOTENV_B64" | base64 -d > admin-web/.env
            echo "Wrote admin-web/.env for CI build."
          else
            printf '%s' "$SERVER_DOTENV_B64" | base64 -d > .env
            echo "Wrote .env for CI build (repo root)."
          fi

      - name: Install and build
        run: |
          if [ -d admin-web ]; then cd admin-web; fi
          npm ci && npm run build

      - name: Pack dist
        run: |
          if [ -d admin-web ]; then cd admin-web; fi
          tar -czf "${GITHUB_WORKSPACE}/admin-dist.tgz" -C dist .

      - name: Upload dist bundle to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          port: ${{ secrets.ALIYUN_SSH_PORT }}
          source: admin-dist.tgz
          target: /tmp/

      - name: Publish static files
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          port: ${{ secrets.ALIYUN_SSH_PORT }}
          script: |
            set -eu
            PUB_DIR="${{ secrets.SERVER_ADMIN_PUBLIC_DIR }}"
            test -d "${PUB_DIR}"
            # Extract as deploy into /tmp first — tar into www-owned setgid PUB_DIR fails with utime/chmod.
            STAGING="$(mktemp -d /tmp/admin-dist.XXXXXX)"
            trap 'rm -rf "${STAGING}"' EXIT
            tar -xzf /tmp/admin-dist.tgz -C "${STAGING}"
            rm -f /tmp/admin-dist.tgz
            cd "${PUB_DIR}"
            # Baota may create .user.ini (often immutable); never delete it. Optional: keep .htaccess if you customize it.
            find . -mindepth 1 ! -name '.user.ini' ! -name '.htaccess' -delete
            # Do not use cp -a: cannot utime/chmod www-owned site root (setgid backend).
            rsync -r --omit-dir-times --no-perms --no-owner --no-group "${STAGING}/" "${PUB_DIR}/"
            # Readable by nginx (www); deploy must be in group www and backend dir g+w (e.g. chmod 2775).
            chgrp -R www "${PUB_DIR}" 2>/dev/null || true
            chmod -R a+rX "${PUB_DIR}" 2>/dev/null || true
